from: markdown+raw_html+raw_tex+tex_math_dollars
to: pdf
standalone: true
pdf-engine: tectonic
metadata:
  lang: zh-CN
variables:
  documentclass: scrartcl
  classoption:
    - paper=a4
    - oneside
    - titlepage=false
    - numbers=noenddot
    - DIV=calc
  linestretch: 1.3
  fontsize: 11pt
  colorlinks: true
include-in-header:
  - header.tex
