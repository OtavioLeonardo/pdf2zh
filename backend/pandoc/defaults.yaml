from: markdown+raw_html+raw_tex+tex_math_dollars
to: pdf
standalone: true
pdf-engine: tectonic
resource-path:
  - .
  - /Users/otavio/Workspace/pdf2zh/backend/pandoc
metadata:
  lang: zh-CN
variables:
  documentclass: scrartcl
  classoption:
    - paper=a4
    - oneside
    - titlepage=false
    - numbers=noenddot
    - DIV=calc
  linestretch: 1.3
  fontsize: 11pt
  mainfont: Times New Roman
  sansfont: Arial
  monofont: Menlo
  CJKmainfont: Songti SC
  CJKsansfont: PingFang SC
  CJKmonofont: PingFang SC
  colorlinks: true
include-in-header:
  - header.tex
