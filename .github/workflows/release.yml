name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      - run: npm ci
      - name: Verify tag matches source version
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: |
          node -e "const fs=require('fs'); const expected=(process.env.EXPECTED_VERSION||'').replace(/^v/,''); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')).version; const tauri=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')).version; const cargo=fs.readFileSync('src-tauri/Cargo.toml','utf8').match(/^version = \"([^\"]+)\"/m)?.[1]; const versions={pkg,tauri,cargo}; const mismatched=Object.entries(versions).filter(([,v])=>v!==expected); if(mismatched.length){console.error('Tag/version mismatch', {expected, versions}); process.exit(1);} console.log('Verified release version', expected);"
      - name: Install runtime tools
        run: brew install pandoc tectonic
      - name: Prepare runtime
        run: |
          uv python install 3.12
          PYTHON_BIN="$(uv python find 3.12)"
          PYTHON_HOME="$(dirname "$(dirname "$PYTHON_BIN")")"
          export PDF2ZH_BUNDLE_PANDOC="$(command -v pandoc)"
          export PDF2ZH_BUNDLE_TECTONIC="$(command -v tectonic)"
          export PDF2ZH_BUNDLE_TECTONIC_CACHE="$PWD/backend/runtime/tectonic-cache"
          export PDF2ZH_BUNDLE_PYTHON_HOME="$PYTHON_HOME"
          export PDF2ZH_RUNTIME_PYTHON="$PYTHON_BIN"
          npm run runtime:prepare-tectonic-cache
          echo "Prepared Tectonic cache seed contents:"
          if [ -d "$PDF2ZH_BUNDLE_TECTONIC_CACHE" ]; then
            find "$PDF2ZH_BUNDLE_TECTONIC_CACHE" -maxdepth 4 -print
          else
            echo "Tectonic cache seed directory missing: $PDF2ZH_BUNDLE_TECTONIC_CACHE"
          fi
          npm run runtime:prepare
      - name: Verify bundled runtime
        run: npm run runtime:verify
      - name: Build macOS app bundle
        run: npm run tauri build -- --bundles app
      - name: Runtime and app size summary
        run: |
          echo "Runtime size:"
          du -sh backend/runtime
          echo "App bundle size:"
          du -sh src-tauri/target/release/bundle/macos/PDF2ZH.app
      - name: Archive macOS app for release
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            src-tauri/target/release/bundle/macos/PDF2ZH.app \
            "src-tauri/target/release/bundle/macos/PDF2ZH_${GITHUB_REF_NAME}_macos_app.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: pdf2zh-macos-app
          path: src-tauri/target/release/bundle/macos/PDF2ZH.app
      - name: Build macOS dmg
        continue-on-error: true
        run: npm run tauri build -- --bundles dmg
      - name: DMG size summary
        if: ${{ hashFiles('src-tauri/target/release/bundle/dmg/*.dmg') != '' }}
        run: du -sh src-tauri/target/release/bundle/dmg/*.dmg
      - uses: actions/upload-artifact@v4
        if: ${{ hashFiles('src-tauri/target/release/bundle/dmg/*.dmg') != '' }}
        with:
          name: pdf2zh-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
      - name: Upload macOS assets to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "" || \
              gh release view "${GITHUB_REF_NAME}" >/dev/null
          fi
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" --jq '.id')"
          gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets" --jq '.[] | select(.name | test("_macos_app\\.zip$|\\.dmg$")) | .id' | while read -r asset_id; do
            [ -n "${asset_id}" ] && gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
          done
          shopt -s nullglob
          files=(
            src-tauri/target/release/bundle/macos/PDF2ZH_${GITHUB_REF_NAME}_macos_app.zip
            src-tauri/target/release/bundle/dmg/*.dmg
          )
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber

  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      - run: npm ci
      - name: Verify tag matches source version
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        env:
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: |
          @'
          const fs = require("fs");
          const expected = (process.env.EXPECTED_VERSION || "").replace(/^v/, "");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          const tauri = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version;
          const cargo = fs
            .readFileSync("src-tauri/Cargo.toml", "utf8")
            .match(/^version = "([^"]+)"/m)?.[1];
          const versions = { pkg, tauri, cargo };
          const mismatched = Object.entries(versions).filter(([, value]) => value !== expected);

          if (mismatched.length) {
            console.error("Tag/version mismatch", { expected, versions });
            process.exit(1);
          }

          console.log("Verified release version", expected);
          '@ | node
      - name: Install runtime tools
        shell: pwsh
        run: |
          choco install pandoc -y
          $tectonicVersion = "0.16.9"
          $tectonicArchive = "tectonic-$tectonicVersion-x86_64-pc-windows-msvc.zip"
          $tectonicUrl = "https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%40$tectonicVersion/$tectonicArchive"
          $tectonicRoot = Join-Path $env:RUNNER_TEMP "tectonic-$tectonicVersion"
          $tectonicZip = Join-Path $env:RUNNER_TEMP $tectonicArchive
          Invoke-WebRequest -Uri $tectonicUrl -OutFile $tectonicZip
          if (Test-Path $tectonicRoot) {
            Remove-Item $tectonicRoot -Recurse -Force
          }
          Expand-Archive -Path $tectonicZip -DestinationPath $tectonicRoot
          Add-Content -Path $env:GITHUB_PATH -Value $tectonicRoot
      - name: Prepare runtime
        shell: pwsh
        run: |
          uv python install 3.12
          $pythonBin = uv python find 3.12
          $pythonHome = Split-Path -Parent $pythonBin
          $env:PDF2ZH_BUNDLE_PANDOC = (Get-Command pandoc.exe).Source
          $env:PDF2ZH_BUNDLE_TECTONIC = (Get-Command tectonic.exe).Source
          $env:PDF2ZH_BUNDLE_TECTONIC_CACHE = Join-Path $PWD "backend/runtime/tectonic-cache"
          Write-Host "Resolved pandoc binary: $env:PDF2ZH_BUNDLE_PANDOC"
          Write-Host "Resolved tectonic binary: $env:PDF2ZH_BUNDLE_TECTONIC"
          & $env:PDF2ZH_BUNDLE_TECTONIC --version
          $env:PDF2ZH_BUNDLE_PYTHON_HOME = $pythonHome
          $env:PDF2ZH_RUNTIME_PYTHON = $pythonBin
          npm run runtime:prepare-tectonic-cache
          Write-Host "Prepared Tectonic cache seed contents:"
          if (Test-Path $env:PDF2ZH_BUNDLE_TECTONIC_CACHE) {
            Get-ChildItem $env:PDF2ZH_BUNDLE_TECTONIC_CACHE -Recurse -Force | Select-Object FullName,Length
          } else {
            Write-Host "Tectonic cache seed directory missing: $env:PDF2ZH_BUNDLE_TECTONIC_CACHE"
          }
          npm run runtime:prepare
      - name: Verify bundled runtime
        run: npm run runtime:verify
      - name: Build
        run: npm run tauri build
      - name: Bundle size summary
        shell: pwsh
        run: |
          Write-Host "Runtime size:"
          Get-ChildItem backend/runtime -Recurse | Measure-Object -Property Length -Sum
          Write-Host "Bundle outputs:"
          Get-ChildItem src-tauri/target/release/bundle -Recurse -File | Select-Object FullName,Length
      - uses: actions/upload-artifact@v4
        with:
          name: pdf2zh-windows
          path: src-tauri/target/release/bundle/**
      - name: Upload Windows assets to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:GITHUB_REF_NAME *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:GITHUB_REF_NAME --title $env:GITHUB_REF_NAME --notes "" *> $null
            if ($LASTEXITCODE -ne 0) {
              gh release view $env:GITHUB_REF_NAME *> $null
            }
          }

          $release = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$env:GITHUB_REF_NAME" | ConvertFrom-Json
          $assets = gh api "repos/$env:GITHUB_REPOSITORY/releases/$($release.id)/assets" | ConvertFrom-Json
          $assets |
            Where-Object { $_.name -match '\.(msi|exe)$' } |
            ForEach-Object {
              gh api --method DELETE "repos/$env:GITHUB_REPOSITORY/releases/assets/$($_.id)" *> $null
            }

          $files = Get-ChildItem src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in @('.msi', '.exe') } |
            Select-Object -ExpandProperty FullName

          if ($files.Count -gt 0) {
            gh release upload $env:GITHUB_REF_NAME $files --clobber
          } else {
            Write-Host "No Windows release assets found to upload."
          }
